<!doctype html>
<html>
<head>
    <title>Dog or Cat?</title>
    <link rel="stylesheet" href="ITS365.2-art.css">
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
</head>

<body>

<h1>Dog or Cat?</h1>

<main>
<div class="controls">
    <input type="file" id="imageInput" accept="image/jpeg">
    <button onclick="runONYX()">Run</button>
    <p id="output">Output: </p>
</div>
</main>

<script>
let session;

// load model
async function loadModel() {
    session = await ort.InferenceSession.create("cats_dogs_model.onnx");
}

// preprocess image
function preprocessImage(img) {
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    const size = 224;
    canvas.width = size;
    canvas.height = size;

    ctx.drawImage(img, 0, 0, size, size);
    const data = ctx.getImageData(0, 0, size, size).data;

    const floatData = new Float32Array(size * size * 3);

    for (let i = 0; i < size * size; i++) {
        floatData[i] = data[i * 4] / 255.0;
        floatData[i + size * size] = data[i * 4 + 1] / 255.0;
        floatData[i + 2 * size * size] = data[i * 4 + 2] / 255.0;
    }

    return new ort.Tensor("float32", floatData, [1, 3, size, size]);
}

// run inference
async function runONYX() {
    const file = document.getElementById("imageInput").files[0];
    if (!file) return;

    const img = new Image();
    img.src = URL.createObjectURL(file);

    img.onload = async () => {
        const inputTensor = preprocessImage(img);

        const feeds = {};
        feeds[session.inputNames[0]] = inputTensor;

        const results = await session.run(feeds);
        const output = results[session.outputNames[0]].data;

        let label = output[0] > 0.5 ? "Dog" : "Cat";

        document.getElementById("output").innerText =
            "Output: " + label;
    };
}

loadModel();
</script>

</body>
</html>
